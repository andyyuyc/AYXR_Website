<footer class="site-footer">
  <div class="footer-row">
    <div class="footer-col">
      <div class="footer-label">// company</div>
      <div>AYXR LLC</div>
      <div class="dim">Founded {{ site.Params.founded }} · Raleigh, NC</div>
    </div>
    <div class="footer-col">
      <div class="footer-label">// contact</div>
      <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
      <a href="mailto:{{ site.Params.emailSupport }}">{{ site.Params.emailSupport }}</a>
    </div>
    <div class="footer-col">
      <div class="footer-label">// status</div>
      <div><span class="status-dot"></span>online</div>
    </div>
  </div>
  <div class="footer-bottom">
    <span>© {{ now.Year }} AYXR LLC. All rights reserved.</span>
    <span class="dim">ayxr.net</span>
  </div>
</footer>
